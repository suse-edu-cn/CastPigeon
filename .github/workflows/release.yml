name: Release on Version Update

on:
  push:
    branches:
      - main
      - master
    paths:
      - "flutter_app/**"
      - "androidRuntime/**"
      - "sharedLogic/**"
      - "kmp_core/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/release.yml"
      - ".github/scripts/build_changelog.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_version:
    runs-on: ubuntu-latest
    outputs:
      release_changed: ${{ steps.check.outputs.release_changed }}
      release_version: ${{ steps.check.outputs.release_version }}
      release_build_number: ${{ steps.check.outputs.release_build_number }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Flutter Version
        id: check
        shell: bash
        run: |
          git fetch --tags --force

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import re
          import subprocess
          import sys

          def version_parts(value):
              return tuple(int(part) for part in re.findall(r"\d+", value))

          pubspec = pathlib.Path("flutter_app/pubspec.yaml").read_text()
          match = re.search(r"^version:\s*([0-9]+(?:\.[0-9]+){2})\+([0-9]+)\s*$", pubspec, re.MULTILINE)
          if not match:
              print("无法从 flutter_app/pubspec.yaml 读取 version，期望格式为 1.2.3+123。", file=sys.stderr)
              sys.exit(1)

          release_version = match.group(1)
          release_build_number = match.group(2)
          release_tag = f"v{release_version}"

          tags = subprocess.check_output(["git", "tag", "--list", "v*"], text=True).splitlines()
          latest_release = max(
              ((version_parts(tag.removeprefix("v")), tag) for tag in tags),
              default=None,
          )
          release_changed = latest_release is None or version_parts(release_version) > latest_release[0]
          if release_tag in tags:
              release_changed = False

          print(f"release_version={release_version}")
          print(f"release_build_number={release_build_number}")
          print(f"release_tag={release_tag}")
          print(f"release_changed={str(release_changed).lower()}")
          PY

  build-android:
    needs: check_version
    if: needs.check_version.outputs.release_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Decode Android Keystore
        shell: bash
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$ENCODED_KEYSTORE" ]; then
            echo "缺少 GitHub Secret: KEYSTORE_BASE64"
            exit 1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "缺少 Android 签名 Secret: KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD"
            exit 1
          fi
          echo "$ENCODED_KEYSTORE" | base64 -d > "$RUNNER_TEMP/castpigeon-release.jks"

      - name: Build Signed Release APK
        shell: bash
        env:
          KEYSTORE_FILE_PATH: ${{ runner.temp }}/castpigeon-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd flutter_app
          flutter pub get
          flutter build apk --release \
            --build-name "${{ needs.check_version.outputs.release_version }}" \
            --build-number "${{ needs.check_version.outputs.release_build_number }}"

          mkdir -p ../dist
          OUT_APK="../dist/CastPigeon-Android-v${{ needs.check_version.outputs.release_version }}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$OUT_APK"
          (
            cd ../dist
            sha256sum "$(basename "$OUT_APK")" > "$(basename "$OUT_APK").sha256"
          )

      - name: Upload Android Assets
        uses: actions/upload-artifact@v4
        with:
          name: android-release-assets
          path: |
            dist/CastPigeon-Android-v${{ needs.check_version.outputs.release_version }}.apk
            dist/CastPigeon-Android-v${{ needs.check_version.outputs.release_version }}.apk.sha256
          if-no-files-found: error

  build-macos:
    needs: check_version
    if: needs.check_version.outputs.release_changed == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Build Ad-Hoc macOS DMG
        shell: bash
        run: |
          cd flutter_app
          flutter pub get
          flutter precache --macos

          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            sudo xcode-select -s "$LATEST_XCODE"
            echo "使用 Xcode: $LATEST_XCODE"
          fi

          flutter build macos --release --config-only \
            --build-name "${{ needs.check_version.outputs.release_version }}" \
            --build-number "${{ needs.check_version.outputs.release_build_number }}"
          test -f macos/Flutter/ephemeral/FlutterInputs.xcfilelist
          test -f macos/Flutter/ephemeral/FlutterOutputs.xcfilelist

          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "platform=macOS,arch=arm64" \
            -derivedDataPath build/macos \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            FLUTTER_BUILD_NAME="${{ needs.check_version.outputs.release_version }}" \
            FLUTTER_BUILD_NUMBER="${{ needs.check_version.outputs.release_build_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            build

          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "未找到 macOS app bundle。"
            exit 1
          fi

          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            while IFS= read -r binary_path; do
              codesign --force --sign - --timestamp=none "$binary_path"
            done < <(find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" \))
            while IFS= read -r framework_path; do
              codesign --force --sign - --timestamp=none "$framework_path"
            done < <(find "$APP_PATH/Contents/Frameworks" -type d -name "*.framework")
          fi
          codesign --force --deep --sign - --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          mkdir -p ../dist
          STAGE_DIR="../build/dmg-stage-ci"
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"
          cp -R "$APP_PATH" "$STAGE_DIR/CastPigeon.app"

          OUT_DMG="../dist/CastPigeon-macOS-v${{ needs.check_version.outputs.release_version }}.dmg"
          hdiutil create -volname "CastPigeon" -srcfolder "$STAGE_DIR" -ov -format UDZO "$OUT_DMG"
          (
            cd ../dist
            shasum -a 256 "$(basename "$OUT_DMG")" > "$(basename "$OUT_DMG").sha256"
          )

      - name: Upload macOS Assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: |
            dist/CastPigeon-macOS-v${{ needs.check_version.outputs.release_version }}.dmg
            dist/CastPigeon-macOS-v${{ needs.check_version.outputs.release_version }}.dmg.sha256
          if-no-files-found: error

  publish-release:
    needs:
      - check_version
      - build-android
      - build-macos
    if: needs.check_version.outputs.release_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Release Assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Changelog
        shell: bash
        run: |
          git fetch --tags --force
          python3 .github/scripts/build_changelog.py \
            --version "${{ needs.check_version.outputs.release_version }}" \
            --tag-prefix v \
            --output changelog.txt

      - name: Publish Unified Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check_version.outputs.release_tag }}
          name: CastPigeon v${{ needs.check_version.outputs.release_version }}
          body_path: changelog.txt
          files: |
            dist/CastPigeon-Android-v${{ needs.check_version.outputs.release_version }}.apk
            dist/CastPigeon-Android-v${{ needs.check_version.outputs.release_version }}.apk.sha256
            dist/CastPigeon-macOS-v${{ needs.check_version.outputs.release_version }}.dmg
            dist/CastPigeon-macOS-v${{ needs.check_version.outputs.release_version }}.dmg.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
